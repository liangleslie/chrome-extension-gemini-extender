<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gemini Extended Sidebar</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 16px;
            background: #f8f9fa;
            color: #202124;
            margin: 0;
        }

        /* Accordion Styles */
        .step-accordion {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        details {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        details[open] {
            border-color: #1a73e8;
            box-shadow: 0 1px 3px 0 rgba(60, 64, 67, 0.3);
        }

        summary {
            list-style: none;
            padding: 14px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            user-select: none;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        /* Prevent manual expanding of locked/unfocused steps */
        details.locked>summary {
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.6;
            background: #f1f3f4;
        }

        .step-content {
            padding: 16px;
            border-top: 1px solid #dadce0;
        }

        .btn-primary {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #1557b0;
        }

        .btn-primary:disabled {
            background-color: #dadce0;
            color: #80868b;
            cursor: not-allowed;
        }

        /* Diagnostic Selection Summary */
        .resolved-selection {
            font-size: 12px;
            color: #5f6368;
            margin-top: 4px;
            font-weight: normal;
        }
    </style>
</head>

<body>
    <div class="step-accordion">

        <!-- STEP 1: Workspace Prompt Input -->
        <details id="step-1" open>
            <summary>
                <span>Step 1: Initialize Workspace</span>
            </summary>
            <div class="step-content">
                <p style="font-size:12px; color:#5f6368; margin-top:0;">Describe what you want to build to begin the
                    interactive prompt optimization workspace.</p>
                <textarea id="prompt-input"
                    style="width:100%; height:80px; padding:8px; border:1px solid #dadce0; border-radius:6px; box-sizing:border-box; font-family:inherit; resize:vertical;"
                    placeholder="E.g., A Manifest V3 Chrome Extension that scrapes recipe blogs and downloads them as markdown files..."></textarea>
                <div style="margin-top:12px; display:flex; gap:8px;">
                    <button id="attach-md-btn"
                        style="padding:8px; background:#f1f3f4; border:1px solid #dadce0; border-radius:6px; font-size:11px; cursor:pointer;">Attach
                        Context Docs</button>
                    <button id="send-initial-btn" class="btn-primary" style="flex:1;">Send Prompt Request</button>
                </div>
            </div>
        </details>

        <!-- STEP 2: Diagnostic Dialog Sequence (Contains 2a, 2b, etc.) -->
        <details id="step-2" class="locked">
            <summary>
                <span>Step 2: Refine Requirements</span>
                <span id="step-2-count"
                    style="font-size:11px; background:#e8f0fe; color:#1a73e8; padding:2px 8px; border-radius:10px; display:none;">0
                    Turns</span>
            </summary>
            <div class="step-content" id="step-2-container" style="display:flex; flex-direction:column; gap:16px;">
                <!-- Chronological turn blocks (2a, 2b...) will append here dynamically -->
                <div id="diagnostics-timeline" style="display:flex; flex-direction:column; gap:16px;"></div>
            </div>
        </details>

        <!-- STEP 3: Optimized System Prompt Output -->
        <details id="step-3" class="locked">
            <summary>
                <span>Step 3: Export Prompt</span>
            </summary>
            <div class="step-content">
                <p style="font-size:12px; color:#5f6368; margin-top:0; margin-bottom:16px;">Your production-ready prompt has been generated. You can edit the fields below before exporting or saving.</p>
                
                <div style="display:flex; flex-direction:column; gap:14px;">
                    <!-- Prompt Text -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label for="final-prompt-output" style="font-size:12px; font-weight:600; color:#3c4043;">Optimized Prompt</label>
                        <textarea id="final-prompt-output"
                            style="width:100%; height:140px; padding:10px; border:1px solid #dadce0; border-radius:6px; box-sizing:border-box; font-family:monospace; font-size:11px; resize:vertical; background:white; color:#202124;"
                            placeholder="Prompt content..."></textarea>
                    </div>

                    <!-- Category -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label for="final-prompt-category" style="font-size:12px; font-weight:600; color:#3c4043;">Category</label>
                        <input type="text" id="final-prompt-category"
                            style="width:100%; padding:8px 10px; border:1px solid #dadce0; border-radius:6px; box-sizing:border-box; font-size:12px; background:white; color:#202124;"
                            placeholder="E.g., coding, writing, summarization">
                    </div>

                    <!-- Tags -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label for="final-prompt-tags" style="font-size:12px; font-weight:600; color:#3c4043;">Tags (comma-separated)</label>
                        <input type="text" id="final-prompt-tags"
                            style="width:100%; padding:8px 10px; border:1px solid #dadce0; border-radius:6px; box-sizing:border-box; font-size:12px; background:white; color:#202124;"
                            placeholder="E.g., react, tailwind, refactor">
                    </div>

                    <!-- Summary -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label for="final-prompt-summary" style="font-size:12px; font-weight:600; color:#3c4043;">Summary</label>
                        <textarea id="final-prompt-summary"
                            style="width:100%; height:60px; padding:8px 10px; border:1px solid #dadce0; border-radius:6px; box-sizing:border-box; font-size:12px; resize:vertical; background:white; color:#202124;"
                            placeholder="Brief description of the prompt's purpose..."></textarea>
                    </div>
                </div>

                <div style="margin-top:20px; display:flex; gap:8px;">
                    <button id="copy-prompt-btn" class="btn-primary" style="flex: 1;">Copy to Clipboard</button>
                    <button id="save-db-btn"
                        style="padding:10px 16px; background:#34a853; color:white; border:none; border-radius:8px; font-weight:500; cursor:pointer; transition: background 0.2s;">Save Prompt</button>
                </div>
            </div>
        </details>

    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
